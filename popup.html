<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="popup.css">
<title>Anti Hallucinations</title>
</head>
<body class="dark">
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
      <span class="logo-text">Anti Hallucinations</span>
    </div>
    <div class="header-right">
      <span class="badge free">FREE</span>
      <button class="theme-btn" id="themeBtn" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Connect to Ollama to start</span>
  </div>

  <!-- SETUP PANEL -->
  <div class="panel setup-panel" id="setupPanel">
    <div class="panel-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      Ollama Not Connected
    </div>
    <p class="panel-desc">Ollama must be running with CORS enabled. Choose your shell:</p>

    <div class="shell-tabs">
      <button class="shell-tab active" data-shell="ps">PowerShell</button>
      <button class="shell-tab" data-shell="cmd">CMD</button>
      <button class="shell-tab" data-shell="bash">Bash/Mac</button>
    </div>

    <pre class="code-block" id="codeBlock">$env:OLLAMA_ORIGINS="*"; ollama serve</pre>

    <div class="btn-row">
      <button class="btn-small" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
      <button class="btn-small btn-primary" id="testBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Connect
      </button>
    </div>

    <div class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <strong>Tip:</strong> Add environment variable <code>OLLAMA_ORIGINS=*</code> then restart Ollama.
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- MAIN PANEL -->
  <div class="panel main-panel" id="mainPanel" style="display:none;">

    <!-- Model -->
    <div class="field">
      <label>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <path d="M8 21h8M12 17v4M2 7h20"/>
        </svg>
        Local Model
      </label>
      <select id="modelSelect">
        <option>No models detected</option>
      </select>
      <div class="model-info">
        <span class="model-tag local">Local</span>
        <span class="model-tag free">Free</span>
        <span class="model-tag unlimited">Unlimited</span>
      </div>
    </div>

    <!-- Input -->
    <div class="field">
      <label>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Statement to Verify
      </label>
      <textarea id="textInput" placeholder="Enter a factual statement to verify... (Ctrl+Enter to run)"></textarea>
    </div>

    <!-- Verify -->
    <button class="btn-verify" id="verifyBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      Verify Fact
    </button>

    <!-- Result -->
    <div id="resultArea"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="footerLeft">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Local · Private · Free
    </span>
    <span id="footerRight">Unlimited</span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
